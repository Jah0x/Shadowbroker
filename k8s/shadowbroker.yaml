apiVersion: v1
kind: Namespace
metadata:
  name: shadowbroker
---
apiVersion: v1
kind: Secret
metadata:
  name: shadowbroker-secrets
  namespace: shadowbroker
type: Opaque
stringData:
  AIS_API_KEY: ""
  LTA_ACCOUNT_KEY: ""
  OPENSKY_CLIENT_ID: ""
  OPENSKY_CLIENT_SECRET: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shadowbroker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/bigbodycobain/shadowbroker-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AIS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shadowbroker-secrets
                  key: AIS_API_KEY
            - name: LTA_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: shadowbroker-secrets
                  key: LTA_ACCOUNT_KEY
            - name: OPENSKY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: shadowbroker-secrets
                  key: OPENSKY_CLIENT_ID
            - name: OPENSKY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shadowbroker-secrets
                  key: OPENSKY_CLIENT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shadowbroker
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shadowbroker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/bigbodycobain/shadowbroker-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shadowbroker
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
